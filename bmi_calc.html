<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="bmi_calc.css">
</head>

<body>

    <div class="container">
        <h1>BMI CALCULATOR</h1>

        <div class="input-group">
            <label for="weight">Weight :</label>
            <input type="number" id="weight" placeholder="Enter your weight in kg">
        </div>

        <div class="input-group">
            <label for="height">Height :</label>
            <input type="number" id="height" placeholder="Enter your height in cm">
        </div>

        <div class="button">
        <button onclick="calculateBMI()" class="cbutton">CALCULATE</button>
        <button onclick="resetFields()" class="rbutton">Reset</button>
        </div>
        
        <div id="result"></div>
    </div>

</body>

    <script src="bmi_calc.js"></script>

</html>
